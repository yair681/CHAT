<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WatchChat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0A1A; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100dvh; display: flex; flex-direction: column; }

  :root {
    --bg: #0A0A1A;
    --card: #16162A;
    --blue: #00E5FF;
    --green: #00FF87;
    --red: #FF2D55;
    --yellow: #FFE600;
    --purple: #BF5AF2;
    --gray: #8E8E93;
  }

  /* SCREENS */
  .screen { display: none; flex-direction: column; height: 100dvh; }
  .screen.active { display: flex; }

  /* LOGIN */
  #loginScreen { align-items: center; justify-content: center; gap: 16px; padding: 24px; }
  #loginScreen h1 { color: var(--blue); font-size: 28px; font-weight: 900; }
  #loginScreen p { color: var(--gray); font-size: 14px; text-align: center; }
  .input-group { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 8px; }
  .input-group label { color: var(--gray); font-size: 13px; }
  .input-group input {
    background: var(--card); border: 1px solid #2a2a4a; color: white;
    padding: 14px 16px; border-radius: 12px; font-size: 16px; outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: var(--blue); }
  .btn {
    width: 100%; max-width: 340px; padding: 15px;
    border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s; -webkit-tap-highlight-color: transparent;
  }
  .btn:active { opacity: 0.8; }
  .btn-blue { background: var(--blue); color: #0A0A1A; }
  .btn-green { background: var(--green); color: #0A0A1A; }
  .btn-red { background: var(--red); color: white; }
  .btn-gray { background: var(--card); color: var(--gray); }

  /* LOBBY */
  #lobbyScreen { align-items: center; justify-content: center; gap: 16px; padding: 24px; }
  #lobbyScreen h2 { color: var(--blue); font-size: 22px; font-weight: 900; }
  .room-code-box {
    background: var(--card); border-radius: 16px; padding: 20px 32px;
    text-align: center;
  }
  .room-code-label { color: var(--gray); font-size: 13px; margin-bottom: 6px; }
  .room-code-value { color: var(--yellow); font-size: 36px; font-weight: 900; letter-spacing: 4px; }
  .copy-hint { color: var(--gray); font-size: 12px; margin-top: 6px; }
  .status-text { font-size: 15px; font-weight: 600; }
  .dots-anim { color: var(--purple); }
  .partner-joined { color: var(--green); }

  /* CHAT */
  #chatScreen { display: none; flex-direction: column; height: 100dvh; }
  #chatScreen.active { display: flex; }
  .chat-header {
    background: var(--card); padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid #2a2a4a; flex-shrink: 0;
  }
  .back-btn { color: var(--blue); font-size: 20px; cursor: pointer; padding: 4px 8px 4px 0; }
  .partner-name { font-weight: 700; font-size: 16px; flex: 1; }
  .typing-indicator { color: var(--green); font-size: 12px; }
  .online-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; }

  .messages-container { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .message { max-width: 75%; padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.4; word-break: break-word; }
  .message.mine { align-self: flex-end; background: rgba(0, 229, 255, 0.2); color: var(--blue); border-bottom-right-radius: 4px; }
  .message.theirs { align-self: flex-start; background: var(--card); color: white; border-bottom-left-radius: 4px; }
  .message .sender { font-size: 11px; opacity: 0.6; margin-bottom: 3px; }

  .quick-replies {
    display: none; flex-wrap: wrap; gap: 8px; padding: 10px 12px;
    background: var(--card); border-top: 1px solid #2a2a4a;
  }
  .quick-replies.open { display: flex; }
  .quick-chip {
    background: #1e1e3a; color: var(--yellow); border: 1px solid #2a2a4a;
    padding: 8px 14px; border-radius: 20px; font-size: 14px; cursor: pointer;
    -webkit-tap-highlight-color: transparent; transition: background 0.15s;
  }
  .quick-chip:active { background: #2a2a5a; }

  .chat-input-bar {
    background: var(--card); padding: 10px 12px;
    display: flex; gap: 8px; align-items: center;
    border-top: 1px solid #2a2a4a; flex-shrink: 0;
  }
  .chat-input {
    flex: 1; background: #1e1e3a; border: 1px solid #2a2a4a;
    color: white; padding: 12px 14px; border-radius: 24px; font-size: 15px; outline: none;
  }
  .send-btn {
    background: var(--blue); color: #0A0A1A; border: none;
    width: 44px; height: 44px; border-radius: 50%; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; -webkit-tap-highlight-color: transparent;
  }
  .quick-btn {
    background: var(--purple); color: white; border: none;
    padding: 10px 14px; border-radius: 22px; font-size: 13px; font-weight: 600;
    cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
  }

  .empty-chat { flex: 1; display: flex; align-items: center; justify-content: center; }
  .empty-chat p { color: var(--gray); font-size: 14px; text-align: center; }

  /* Stars */
  .stars { color: var(--yellow); font-size: 18px; letter-spacing: 4px; }
  .brand { color: var(--purple); font-size: 12px; opacity: 0.7; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <h1>WatchChat</h1>
  <div class="stars">* * * * *</div>
  <p>Chat between watches &amp; phones</p>

  <div class="input-group">
    <label>Your name</label>
    <input type="text" id="usernameInput" placeholder="Enter your name" maxlength="15" autocomplete="off" />
  </div>
  <div class="input-group">
    <label>Room code <span style="color:var(--gray);font-size:11px">(create new or enter friend's code)</span></label>
    <input type="text" id="roomInput" placeholder="e.g. AB3" maxlength="6" autocomplete="off" style="text-transform:uppercase;letter-spacing:2px" />
  </div>

  <button class="btn btn-blue" onclick="joinRoom()">Join / Create Room</button>
  <p class="brand">מאסטר קוד משחקים בע"מ</p>
</div>

<!-- LOBBY -->
<div id="lobbyScreen" class="screen">
  <h2>WatchChat</h2>
  <div class="room-code-box" onclick="copyCode()" style="cursor:pointer">
    <div class="room-code-label">Your room code</div>
    <div class="room-code-value" id="displayCode">---</div>
    <div class="copy-hint">tap to copy</div>
  </div>
  <p style="color:var(--gray);font-size:13px;text-align:center">Send this code to your friend on their watch</p>
  <div id="lobbyStatus" class="status-text dots-anim">Waiting for partner...</div>
  <button class="btn btn-gray" style="max-width:200px" onclick="leaveRoom()">Leave</button>
</div>

<!-- CHAT -->
<div id="chatScreen" class="screen">
  <div class="chat-header">
    <span class="back-btn" onclick="goToLobby()">‹</span>
    <span class="partner-name" id="partnerNameHeader">Partner</span>
    <span class="typing-indicator" id="typingIndicator" style="display:none">typing...</span>
    <span class="online-dot" id="onlineDot" style="display:none"></span>
  </div>

  <div class="messages-container" id="messagesContainer">
    <div class="empty-chat" id="emptyChat">
      <p>No messages yet<br>Say hello!</p>
    </div>
  </div>

  <div class="quick-replies" id="quickReplies">
    <span class="quick-chip" onclick="sendQuick('OK')">OK</span>
    <span class="quick-chip" onclick="sendQuick('On my way')">On my way</span>
    <span class="quick-chip" onclick="sendQuick('Call me')">Call me</span>
    <span class="quick-chip" onclick="sendQuick('Yes')">Yes</span>
    <span class="quick-chip" onclick="sendQuick('No')">No</span>
    <span class="quick-chip" onclick="sendQuick('5 min')">5 min</span>
    <span class="quick-chip" onclick="sendQuick('Where are you?')">Where are you?</span>
    <span class="quick-chip" onclick="sendQuick('Later')">Later</span>
  </div>

  <div class="chat-input-bar">
    <button class="quick-btn" onclick="toggleQuickReplies()">Quick</button>
    <input class="chat-input" id="messageInput" type="text" placeholder="Type a message..." maxlength="200"
      oninput="onTyping()" onkeydown="if(event.key==='Enter')sendMessage()" />
    <button class="send-btn" onclick="sendMessage()">&#8593;</button>
  </div>
</div>

<script>
  const SERVER = 'wss://chat-vasl.onrender.com';
  let ws = null;
  let myUsername = '';
  let myRoom = '';
  let partnerName = '';
  let typingTimer = null;
  let isTypingSent = false;

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function joinRoom() {
    const username = document.getElementById('usernameInput').value.trim();
    const room = document.getElementById('roomInput').value.trim().toUpperCase();
    if (!username || username.length < 2) { alert('Enter your name (min 2 chars)'); return; }
    if (!room || room.length < 2) { alert('Enter a room code (min 2 chars)'); return; }

    myUsername = username;
    myRoom = room;
    document.getElementById('displayCode').textContent = room;
    showScreen('lobbyScreen');
    connectWS();
  }

  function connectWS() {
    if (ws) { ws.close(); ws = null; }
    ws = new WebSocket(SERVER);

    ws.onopen = () => {
      ws.send(JSON.stringify({ type: 'join_room', username: myUsername, room: myRoom }));
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      switch (msg.type) {
        case 'joined':
          document.getElementById('lobbyStatus').textContent = 'Waiting for partner...';
          break;
        case 'partner_joined':
          partnerName = msg.username;
          document.getElementById('lobbyStatus').innerHTML = '<span class="partner-joined">' + partnerName + ' joined! </span>';
          document.getElementById('lobbyStatus').innerHTML += '<br><button class="btn btn-green" style="max-width:200px;margin-top:12px" onclick="startChat()">Start Chat</button>';
          document.getElementById('partnerNameHeader').textContent = partnerName;
          document.getElementById('onlineDot').style.display = 'block';
          break;
        case 'partner_left':
          document.getElementById('onlineDot').style.display = 'none';
          document.getElementById('typingIndicator').style.display = 'none';
          addSystemMessage(partnerName + ' left the chat');
          break;
        case 'message':
          const isMine = msg.from === myUsername;
          addMessage(msg.content, isMine, msg.from);
          break;
        case 'typing':
          const ti = document.getElementById('typingIndicator');
          ti.style.display = msg.isTyping ? 'block' : 'none';
          break;
        case 'error':
          alert(msg.message);
          showScreen('loginScreen');
          break;
      }
    };

    ws.onclose = () => {
      document.getElementById('onlineDot').style.display = 'none';
    };

    ws.onerror = () => {
      alert('Connection error. Check your internet.');
      showScreen('loginScreen');
    };
  }

  function startChat() {
    showScreen('chatScreen');
  }

  function goToLobby() {
    showScreen('lobbyScreen');
  }

  function leaveRoom() {
    if (ws) { ws.close(); ws = null; }
    showScreen('loginScreen');
  }

  function copyCode() {
    navigator.clipboard.writeText(myRoom).then(() => {
      document.querySelector('.copy-hint').textContent = 'copied!';
      setTimeout(() => document.querySelector('.copy-hint').textContent = 'tap to copy', 2000);
    });
  }

  function sendMessage() {
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    if (!content || !ws) return;
    ws.send(JSON.stringify({ type: 'message', content }));
    input.value = '';
    sendTypingStatus(false);
  }

  function sendQuick(text) {
    if (!ws) return;
    ws.send(JSON.stringify({ type: 'message', content: text }));
    document.getElementById('quickReplies').classList.remove('open');
  }

  function toggleQuickReplies() {
    document.getElementById('quickReplies').classList.toggle('open');
  }

  function onTyping() {
    if (!isTypingSent) {
      sendTypingStatus(true);
      isTypingSent = true;
    }
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => { sendTypingStatus(false); isTypingSent = false; }, 1500);
  }

  function sendTypingStatus(isTyping) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'typing', isTyping }));
    }
  }

  function addMessage(content, isMine, from) {
    const container = document.getElementById('messagesContainer');
    const empty = document.getElementById('emptyChat');
    if (empty) empty.remove();

    const div = document.createElement('div');
    div.className = 'message ' + (isMine ? 'mine' : 'theirs');
    if (!isMine) {
      const sender = document.createElement('div');
      sender.className = 'sender';
      sender.textContent = from;
      div.appendChild(sender);
    }
    const text = document.createElement('div');
    text.textContent = content;
    div.appendChild(text);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function addSystemMessage(text) {
    const container = document.getElementById('messagesContainer');
    const div = document.createElement('div');
    div.style.cssText = 'text-align:center;color:var(--gray);font-size:12px;padding:6px;';
    div.textContent = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }
</script>
</body>
</html>
